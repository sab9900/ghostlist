@if (message(); as msg) {
<div class="info-overlay" role="presentation" (click)="dismiss()">
    <div class="info-overlay__card" role="dialog" aria-modal="true" aria-labelledby="info-overlay-title"
        (click)="$event.stopPropagation()">
        <div class="info-overlay__icon"
            [class.info-overlay__icon--release]="msg.type === InfoMessageType.ReleaseNotes"
            [class.info-overlay__icon--maintenance]="msg.type === InfoMessageType.Maintenance" aria-hidden="true">
            @switch (msg.type) {
            @case (InfoMessageType.ReleaseNotes) {
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="8" width="18" height="4" rx="1" />
                <path d="M12 8v13" />
                <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7" />
                <path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5" />
            </svg>
            }
            @case (InfoMessageType.Maintenance) {
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94z" />
            </svg>
            }
            @default {
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="11.5" />
                <line x1="12" y1="8" x2="12" y2="8" />
            </svg>
            }
            }
        </div>

        <span class="info-overlay__badge">{{ typeLabelKey() | translate }}</span>
        <h2 class="info-overlay__title" id="info-overlay-title">{{ msg.title }}</h2>
        <p class="info-overlay__body">{{ msg.body }}</p>

        <button class="btn btn--primary info-overlay__action" (click)="dismiss()">
            {{ 'INFO_CENTER.DISMISS' | translate }}
        </button>
    </div>
</div>
}
