@if (entry(); as img) {
<div class="image-viewer" role="dialog" aria-modal="true" [attr.aria-label]="img.alt" (click)="close()">
    <button type="button" class="image-viewer__close" (click)="close()" [attr.aria-label]="'COMMON.CLOSE' | translate">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
    </button>
    <img class="image-viewer__image" [src]="img.src" [attr.alt]="img.alt" (click)="$event.stopPropagation()" />
</div>
}
