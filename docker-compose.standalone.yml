services:
    db:
        image: postgres:18-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        environment:
            ASPNETCORE_ENVIRONMENT: Production
            ASPNETCORE_URLS: http://+:8080
            ConnectionStrings__DefaultConnection: "Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
            Admin__Username: "${ADMIN_USERNAME}"
            Admin__Password: "${ADMIN_PASSWORD}"
        depends_on:
            db:
                condition: service_healthy
        restart: unless-stopped

    client:
        build:
            context: .
            dockerfile: client/Dockerfile
        ports:
            - "80:80"
        depends_on:
            - server
        restart: unless-stopped

    admin-client:
        build:
            context: .
            dockerfile: admin-client/Dockerfile
        ports:
            - "8081:80"
        depends_on:
            - server
        restart: unless-stopped

volumes:
    postgres_data:
