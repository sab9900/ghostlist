name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/ghostlist-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/ghostlist-client

jobs:
  test-server:
    name: .NET Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore server/GhostList.slnx

      - name: Build
        run: dotnet build server/GhostList.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test server/GhostList.slnx --no-build --configuration Release

  build-client:
    name: Angular Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: client
        run: npm run build

  publish:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-server, build-client]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push server
        run: |
          docker build -f server/Dockerfile -t ${{ env.SERVER_IMAGE }}:latest .
          docker push ${{ env.SERVER_IMAGE }}:latest

      - name: Build & push client
        run: |
          docker build -f client/Dockerfile -t ${{ env.CLIENT_IMAGE }}:latest .
          docker push ${{ env.CLIENT_IMAGE }}:latest

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl --silent --show-error --fail \
            -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
