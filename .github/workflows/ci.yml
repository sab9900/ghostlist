name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: .NET Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore server/GhostList.slnx

      - name: Build
        run: dotnet build server/GhostList.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test server/GhostList.slnx --no-build --configuration Release

  build-client:
    name: Angular Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [test-server, build-client]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl --silent --show-error --fail \
            -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
